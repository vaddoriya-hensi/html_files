<!DOCTYPE html>
<html lang="en">

<head>
    <title>Document</title>
</head>

<body>
    <form action="form.html" method="get">
        <h1>Registration form</h1>
        <label for="name">Name :</label>
        <input type="text" placeholder="enter your name" name="name" required>
        <br><br>
        <label for="email">Email id :</label>
        <input type="email" placeholder="enter your emailid" name="email" required>
        <br><br>
        <label for="address">Addresss :</label>
        <textarea name="address"></textarea>
        <br><br>
        <select name="city" aria-placeholder="choose city" size="5">city :
            <option value="rajkot">rajkot</option>
            <option value="surat" selected>surat</option>
            <option value="ahemdabad">ahemdabad</option>
            <option value="vadodara">vadodara</option>
            <option value="vapi">vapi</option>
        </select>
        <br><br>
        <label for="password">Password :</label>
        <input type="password" placeholder="enter your password" name="password" required>
        <br><br>
        <label for="number"></label>Number :</label>
        <input type="number" name="number" required>
        <br><br>
        <label for="tel">Telephone :</label>
        <input type="tel" name="telephone" placeholder="enter your Telephone number" required>
        <br><br>
        <label for="url">Url :</label>
        <input type="url" placeholder="enter your Url" name="url" required>
        <br><br>
        <label for="date">Date :</label>
        <input type="Date" name="date" required>
        <br><br>
        <label for="datetime-local">datetime-local :</label>
        <input type="datetime-local" name="datetime-local" required>
        <br><br>
        <label for="month">month :</label>
        <input type="month" name="month" required>
        <br><br>
        <label for="time">Time :</label>
        <input type="time" name="time" required>
        <br><br>
        <label for="week">week :</label>
        <input type="week" name="week" required>
        <br><br>
        <label for="month">month :</label>
        <input type="month" name="month" required>
        <br><br>
        <label for="gender">Gender :</label>
        <input type="radio" name="gender" value="Male">male
        <input type="radio" name="gender" value="FeMale" checked>FeMale
        <input type="radio" name="gender" value="other">other
        <br><br>
        <label for="fruits">fruits :</label>
        <input type="checkbox" name="apple" value="apple">apple
        <input type="checkbox" name="graps" value="graps" checked>graps
        <input type="checkbox" name="orange" value="orange">orange
        <br><br>
        <label for="age">Age :</label>
        <input type="range" min="0" max="200" name="age" required>
        <br><br>
        <label for="color">color :</label>
        <input type="color" name="color">
        <br><br>
        <label for="file">file :</label>
        <input type="file" name="file" multiple required>
        <br><br>
        <label for="hidden">hidden :</label>
        <input type="hidden" name="hidden" value="1234" required>
        <br><br>
        <label for="search">search :</label>
        <input type="search" name="search" required>
        <br><br>
        <label for="submit">submit:</label>
        <input type="submit">
        <br><br>
        <label for="reset">reset:</label>
        <input type="reset">
        <br><br>
        <button type="submit">submit</button>
        <button type="reset">reset</button>









    </form>

</body>

</html>
